; PREHEND — predictive grasp controller
; PlatformIO project. Default target is the Arduino UNO R4 WiFi.
;
;   pio run                      # build default env (uno_r4_wifi)
;   pio run -t upload            # build + flash
;   pio device monitor -b 115200 # serial telemetry
;
; The sketch lives in PREHEND/PREHEND.ino. src_dir points there so
; PlatformIO compiles the .ino without renaming it.

[platformio]
src_dir = PREHEND

[env]
framework = arduino
monitor_speed = 115200
build_flags = -Wall

; --- Arduino UNO R4 WiFi (default; 14-bit ADC + FPU) ---
[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi

; --- Arduino UNO R4 Minima ---
[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima

; --- Classic Arduino Uno fallback (10-bit ADC; sketch auto-adjusts) ---
[env:uno]
platform = atmelavr
board = uno

; --- ESP32 DevKit (WiFi + WebSocket telemetry) ---
; NOTE: The ESP32 sketch lives in signal_firmware/PREHEND_ESP32.ino,
; which is OUTSIDE the main src_dir (PREHEND/). To build it with
; PlatformIO, either:
;   1. Create a separate PlatformIO project with src_dir = signal_firmware
;   2. Compile manually with the Arduino IDE / arduino-cli
;   3. Temporarily change src_dir above to signal_firmware
; The env below documents the correct platform/board/lib_deps for reference.
[env:esp32]
platform = espressif32
board = esp32dev
lib_deps =
    links2004/WebSockets @ ^2.4.0
    madhephaestus/ESP32Servo @ ^3.0.5
build_flags = -Wall
